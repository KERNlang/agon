name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          # kern_engines is a PRIVATE submodule (KERNlang/kern-engines). The default
          # GITHUB_TOKEN can't read another private repo, so authenticate the submodule
          # fetch with a read-only deploy key stored as the KERN_ENGINES_DEPLOY_KEY secret.
          # See .github/SUBMODULE_CI_SETUP.md for how to provision it.
          ssh-key: ${{ secrets.KERN_ENGINES_DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Compile KERN sources
        run: npm run kern:compile

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test
