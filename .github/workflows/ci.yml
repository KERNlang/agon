name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # kern_engines is a public submodule (KERNlang/kern-engines) over HTTPS,
          # so the default GITHUB_TOKEN checks it out with no extra credentials.
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      - name: Compile KERN sources
        run: npm run kern:compile

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test
