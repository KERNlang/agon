name: Release

# Tag-driven release. Create a GitHub Release (or push a tag) named vX.Y.Z and
# this workflow stamps that version into @kernlang/agon, gates, publishes, and
# commits the version bump back to main — so the `agon` banner (which reads
# @kernlang/agon's package.json version at runtime) shows the released tag with
# no local steps.
#
# The tag drives ONLY the CLI (product) version. @kernlang/agon-engines and
# @kernlang/agon-dedup keep their own independent versions and are republished
# only when THEIR version changes (publish-if-new.mjs skips already-published
# versions), so a CLI-only release never fails on "cannot publish over existing
# version".
#
# Requires an NPM_TOKEN repo secret (Settings → Secrets → Actions) with publish
# rights to the @kernlang scope.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write  # commit the version bump back to main

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # kern_engines is a public submodule (KERNlang/kern-engines) over HTTPS,
          # so the default GITHUB_TOKEN checks it out with no extra credentials.
          submodules: recursive
          # Need full history + a writable token to push the bump commit to main.
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          # Writes the registry + auth placeholder used by NODE_AUTH_TOKEN below.
          registry-url: 'https://registry.npmjs.org'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      # Stamp the tag version into @kernlang/agon (packages/cli) + the banner
      # fallback literal. This is the only version the tag drives.
      - name: Set version from tag
        run: npm run release:set-version -- "${GITHUB_REF_NAME}"

      - name: Compile KERN sources
        run: npm run kern:compile

      # Gate the release on the same checks CI runs — never publish a red tree.
      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      # Publish in dependency order: engines + dedup (runtime deps that carry the
      # Python twins) BEFORE @kernlang/agon. publish-if-new.mjs skips any package
      # whose version is already on npm, so unchanged substrates are no-ops.
      - name: Publish to npm
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Commit the version bump (+ regenerated banner) back to main so the repo
      # and npm never drift. Only the CLI version + its generated banner change.
      - name: Commit version bump to main
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/cli/package.json packages/cli/src/kern/blocks/engine.kern packages/cli/src/generated/blocks/engine.tsx
          if git diff --cached --quiet; then
            echo "No version change to commit (already at ${VERSION})."
          else
            git commit -m "chore(release): @kernlang/agon ${VERSION} [skip ci]"
            git push origin HEAD:main
          fi
