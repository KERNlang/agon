name: Release

# Tag-driven LOCKSTEP release. Create a GitHub Release (or push a tag) named
# vX.Y.Z and this workflow stamps that one version into the WHOLE
# @kernlang/agon-* family — every workspace package's version + internal dep
# ranges, the citty meta (agon --version), and the banner fallback — then gates,
# publishes, and commits the bump back to main. No manual per-package bump.
#
# The tag drives the version of the agon family; @kernlang/agon-dedup moves with
# it and is republished at the tag version. publish-if-new.mjs skips any version
# already on npm, so a re-run of the same tag is a safe no-op, not a hard failure.
# Only the consumed packages are published (@kernlang/agon + -dedup);
# core/forge/adapter-cli are inlined into the CLI bundle and need no npm release.
#
# @kernlang/agon-engines is NOT part of this release — it's an independent, shared
# package that self-publishes from its own repo (KERNlang/kern-engines); agon only
# depends on a published version of it.
#
# Requires an NPM_TOKEN repo secret (Settings → Secrets → Actions) with publish
# rights to the @kernlang scope.
on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # push the version-sync branch
  pull-requests: write  # open the sync PR (main is branch-protected)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Default checkout = the EXACT commit the tag points to. Build & publish
          # from the tag so npm artifacts always match the release tag, never a
          # moved main HEAD. Full history is needed for the sync-to-main step below.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          # Writes the registry + auth placeholder used by NODE_AUTH_TOKEN below.
          registry-url: 'https://registry.npmjs.org'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: npm ci

      # Stamp the tag version into the whole @kernlang/agon-* family (every
      # workspace package + internal dep ranges + the two version literals).
      - name: Set version from tag
        run: npm run release:set-version -- "${GITHUB_REF_NAME}"

      - name: Compile KERN sources
        run: npm run kern:compile

      # Gate the release on the same checks CI runs — never publish a red tree.
      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      # Publish dedup (runtime Python-twin dep) BEFORE @kernlang/agon.
      # publish-if-new.mjs skips any package whose version is already on npm, so
      # an unchanged substrate is a no-op.
      - name: Publish to npm
        run: npm run release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Sync the released version into main as a follow-up commit so the repo and
      # npm never drift. Re-stamped on a FRESH checkout of latest main (not the
      # detached tag), so the push always fast-forwards even if main advanced
      # after the tag was cut. Publishing already succeeded above, so this bump is
      # best-effort (continue-on-error) and never fails or blocks the release.
      # main is branch-protected, so the bot can't push the version bump directly.
      # Instead push it to a per-version branch and open a PR via the REST API
      # (no gh CLI). Merge it to keep main's package.json versions in sync with
      # what was published. Best-effort — never fails or blocks the release.
      - name: Sync version bump to main (PR)
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BRANCH="release/sync-v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -B "${BRANCH}" origin/main
          npm run release:set-version -- "${VERSION}"
          npm run kern:compile
          # Stage every lockstep-bumped tracked file in the agon family.
          git add \
            packages/core/package.json \
            packages/forge/package.json \
            packages/adapter-cli/package.json \
            packages/cli/package.json \
            packages/mcp/package.json \
            packages/saas-api/package.json \
            packages/dedup/package.json \
            packages/cli/src/index.ts \
            packages/cli/src/kern/blocks/engine.kern \
            packages/cli/src/generated/blocks/engine.tsx
          if git diff --cached --quiet; then
            echo "main already at ${VERSION}; nothing to sync."
            exit 0
          fi
          git commit -m "chore(release): @kernlang/agon ${VERSION} (lockstep) [skip ci]"
          git push -f origin "${BRANCH}"
          # Open the sync PR (idempotent — a 422 'already exists' is fine).
          curl -sS -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls" \
            -d "$(printf '{"title":"chore(release): sync version to %s","head":"%s","base":"main","body":"Automated lockstep version sync after publishing %s. Safe to merge."}' "${VERSION}" "${BRANCH}" "${VERSION}")" \
            || echo "PR create returned non-zero (likely already open) — continuing."
