<svg width="800" height="280" viewBox="0 0 800 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1207"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#f97316" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.08"/>
    </linearGradient>

    <style>
      @keyframes race1 { 0% { transform: translateX(0); } 40% { transform: translateX(18px); } 70% { transform: translateX(6px); } 100% { transform: translateX(0); } }
      @keyframes race2 { 0% { transform: translateX(0); } 30% { transform: translateX(-6px); } 60% { transform: translateX(14px); } 100% { transform: translateX(0); } }
      @keyframes race3 { 0% { transform: translateX(0); } 50% { transform: translateX(20px); } 80% { transform: translateX(4px); } 100% { transform: translateX(0); } }
      @keyframes flicker { 0%,100% { opacity: 0.15; } 50% { opacity: 0.35; } }
      @keyframes glow-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
      @keyframes spark1 { 0% { opacity: 0; } 20% { opacity: 0.8; } 100% { opacity: 0; transform: translate(-8px, -12px); } }
      @keyframes spark2 { 0% { opacity: 0; } 25% { opacity: 0.6; } 100% { opacity: 0; transform: translate(-6px, -16px); } }
      @keyframes trophy-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
      .a1 { animation: race1 3s ease-in-out infinite; }
      .a2 { animation: race2 3.4s ease-in-out infinite; }
      .a3 { animation: race3 2.8s ease-in-out infinite; }
      .fl { animation: flicker 2s ease-in-out infinite; }
      .gl { animation: glow-pulse 2s ease-in-out infinite; }
      .s1 { animation: spark1 1.6s ease-out infinite; }
      .s2 { animation: spark2 2s ease-out infinite 0.5s; }
      .tr { animation: trophy-bob 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  <rect width="800" height="280" rx="12" fill="url(#glow)"/>

  <!-- Top accent -->
  <rect y="0" width="800" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Laurel mark — "Cesar's Kranz" — serves as the leading "A" -->
  <svg x="284" y="0" width="88" height="88" viewBox="0 0 128 128" overflow="visible"><defs><linearGradient id="gh" x1="0" y1="14" x2="0" y2="120" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#ffc24d"/><stop offset=".5" stop-color="#ff7a2c"/><stop offset="1" stop-color="#e83f24"/></linearGradient></defs><g transform="translate(64 65) scale(1.10) translate(-64 -65)"><path d="M64,119 Q4,94 34,26" fill="none" stroke="url(#gh)" stroke-width="3.2" stroke-linecap="round"/><ellipse cx="38.5" cy="95.6" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-158.8 38.5 95.6)"/><ellipse cx="32.7" cy="86.2" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-144.2 32.7 86.2)"/><ellipse cx="29.5" cy="75.5" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-129.7 29.5 75.5)"/><ellipse cx="28.8" cy="63.4" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-117.1 28.8 63.4)"/><ellipse cx="30.9" cy="49.7" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-106.8 30.9 49.7)"/><ellipse cx="35.7" cy="34.4" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-98.8 35.7 34.4)"/><path d="M64,119 Q124,94 94,26" fill="none" stroke="url(#gh)" stroke-width="3.2" stroke-linecap="round"/><ellipse cx="89.5" cy="95.6" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-21.2 89.5 95.6)"/><ellipse cx="95.3" cy="86.2" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-35.8 95.3 86.2)"/><ellipse cx="98.5" cy="75.5" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-50.3 98.5 75.5)"/><ellipse cx="99.2" cy="63.4" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-62.9 99.2 63.4)"/><ellipse cx="97.1" cy="49.7" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-73.2 97.1 49.7)"/><ellipse cx="92.3" cy="34.4" rx="9.5" ry="4" fill="url(#gh)" transform="rotate(-81.2 92.3 34.4)"/><circle cx="64" cy="118" r="4.8" fill="url(#gh)"/><g fill="url(#gh)" transform="translate(64 71) scale(0.60) translate(-64 -62)"><polygon points="61,20 68,20 35,103 23,103"/><polygon points="65,20 77,20 109,103 95,103"/><rect x="42" y="80" width="46" height="7"/><rect x="14" y="100" width="29" height="8" rx="2"/><rect x="88" y="100" width="31" height="8" rx="2"/><rect x="57" y="17" width="14" height="5" rx="1.5"/></g></g></svg>

  <!-- "GON" — lighter weight to sit with the serif A in the mark -->
  <text x="368" y="66" text-anchor="start" font-family="'SF Mono','Fira Code','JetBrains Mono',monospace" font-size="58" font-weight="500" letter-spacing="18" fill="url(#text-grad)">GON</text>

  <!-- Tagline -->
  <text x="400" y="122" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="17" font-weight="400" fill="#d4a041">Any AI can join. They compete. You ship.</text>

  <!-- ═══ ARENA ═══ -->
  <g transform="translate(180, 126)">
    <!-- Track lanes -->
    <line x1="0" y1="15" x2="400" y2="15" stroke="#2d2006" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="0" y1="42" x2="400" y2="42" stroke="#2d2006" stroke-width="1" stroke-dasharray="3,5"/>
    <line x1="0" y1="69" x2="400" y2="69" stroke="#2d2006" stroke-width="1" stroke-dasharray="3,5"/>

    <!-- Finish -->
    <rect x="390" y="2" width="2" height="80" fill="#f97316" opacity="0.25" rx="1"/>

    <!-- Agent 1 — leading, on fire -->
    <g class="a1">
      <ellipse cx="310" cy="15" rx="18" ry="7" fill="#f97316" opacity="0.1" class="fl"/>
      <ellipse cx="318" cy="15" rx="10" ry="5" fill="#fbbf24" opacity="0.15" class="fl"/>
      <circle cx="328" cy="11" r="1.5" fill="#fbbf24" class="s1"/>
      <circle cx="332" cy="8" r="1" fill="#f97316" class="s2"/>
      <circle cx="336" cy="15" r="8" fill="#fbbf24" class="gl"/>
      <circle cx="336" cy="15" r="5" fill="#0d1117"/>
      <circle cx="336" cy="15" r="2.5" fill="#fbbf24"/>
    </g>

    <!-- Agent 2 — close -->
    <g class="a2">
      <ellipse cx="280" cy="42" rx="12" ry="5" fill="#22d3ee" opacity="0.08" class="fl"/>
      <circle cx="296" cy="42" r="8" fill="#22d3ee" opacity="0.8"/>
      <circle cx="296" cy="42" r="5" fill="#0d1117"/>
      <circle cx="296" cy="42" r="2.5" fill="#22d3ee"/>
    </g>

    <!-- Agent 3 — catching up -->
    <g class="a3">
      <ellipse cx="240" cy="69" rx="10" ry="4" fill="#a78bfa" opacity="0.06" class="fl"/>
      <circle cx="260" cy="69" r="8" fill="#a78bfa" opacity="0.7"/>
      <circle cx="260" cy="69" r="5" fill="#0d1117"/>
      <circle cx="260" cy="69" r="2.5" fill="#a78bfa"/>
    </g>

    <!-- Trophy -->
    <g transform="translate(410, 28)" class="tr">
      <text x="0" y="0" font-size="20">🏆</text>
    </g>
  </g>

  <!-- Stats pills — centered -->
  <g transform="translate(400, 248)" text-anchor="middle">
    <rect x="-130" y="-14" width="120" height="28" rx="14" fill="#1c1505" stroke="#3d2e08" stroke-width="1"/>
    <text x="-70" y="5" font-family="'SF Mono',monospace" font-size="12" font-weight="700" fill="#f97316">100% KERN</text>

    <rect x="10" y="-14" width="120" height="28" rx="14" fill="#1c1505" stroke="#3d2e08" stroke-width="1"/>
    <text x="70" y="5" font-family="'SF Mono',monospace" font-size="12" font-weight="700" fill="#ef4444">Glicko-2</text>
  </g>

  <!-- Bottom accent -->
  <rect y="277" width="800" height="3" rx="1.5" fill="url(#accent)" opacity="0.3"/>
</svg>
